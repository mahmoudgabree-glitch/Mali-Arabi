<!DOCTYPE html>
<html lang="bs" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Arabi MALI - Naučite Arapski</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0a0a14;
  --bg-card: #12121f;
  --bg-card-hover: #1e1e35;
  --accent: #f59e0b;
  --accent-light: #fbbf24;
  --accent-glow: rgba(245,158,11,0.25);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --success: #22c55e;
  --error: #ef4444;
  --info: #3b82f6;
  --purple: #a855f7;
  --pink: #ec4899;
  --teal: #14b8a6;
  --border: rgba(255,255,255,0.06);
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 50px var(--accent-glow);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family:'Noto Sans', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  touch-action: manipulation;
}
body[dir="rtl"] { direction: rtl; }
body[dir="rtl"] .nav-left { flex-direction: row-reverse; }
body[dir="rtl"] .nav-right { flex-direction: row-reverse; }

#particles-canvas {
  position: fixed; top:0; left:0; width:100%; height:100%;
  z-index: 0; pointer-events: none; opacity: 0.35;
}

.header {
  position: fixed; top:0; left:0; right:0; z-index: 100;
  background: rgba(10,10,20,0.9);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-left, .nav-right { display: flex; align-items: center; gap: 12px; }
.logo {
  display: flex; align-items: center; gap: 8px;
  font-weight: 800; font-size: 1.2rem;
  color: var(--accent); text-decoration: none;
  cursor: pointer; user-select: none;
}
.logo-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
}

.lang-toggle {
  display: flex; gap: 3px;
  background: var(--bg-card); border-radius: 8px; padding: 2px;
  border: 1px solid var(--border);
}
.lang-btn {
  padding: 5px 12px; border: none; border-radius: 6px;
  background: transparent; color: var(--text-secondary);
  font-weight: 600; cursor: pointer; transition: all 0.3s;
  font-size: 0.8rem;
}
.lang-btn.active {
  background: var(--accent); color: #000;
  box-shadow: 0 2px 10px var(--accent-glow);
}

.user-stats {
  display: flex; align-items: center; gap: 10px;
}
.stat-item {
  display: flex; align-items: center; gap: 4px;
  background: var(--bg-card); padding: 5px 10px;
  border-radius: 8px; border: 1px solid var(--border);
  font-size: 0.8rem; font-weight: 600;
}
.stat-item .icon { font-size: 1rem; }
.stat-item.xp { color: var(--accent); }
.stat-item.gems { color: var(--purple); }
.stat-item.streak { color: var(--teal); }

.sound-toggle {
  width: 34px; height: 34px; border-radius: 8px;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; transition: all 0.3s;
}
.sound-toggle:hover, .sound-toggle.on {
  background: var(--accent); color: #000;
}

.main-content {
  padding-top: 70px; padding-bottom: 40px;
  position: relative; z-index: 1;
  max-width: 1200px; margin: 0 auto; padding-left: 20px; padding-right: 20px;
}

.hero {
  text-align: center; padding: 30px 0 24px;
}
.hero h1 {
  font-size: 2.4rem; font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--purple), var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 6px;
}
.hero .subtitle {
  font-size: 1rem; color: var(--text-secondary);
  margin-bottom: 16px;
}
.hero .arabic-welcome {
  font-family: 'Noto Naskh Arabic', serif;
  font-size: 1.8rem; color: var(--accent-light);
  margin-bottom: 16px; direction: rtl;
}
.level-bar {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-top: 12px; flex-wrap: wrap;
}
.level-info {
  background: var(--bg-card); padding: 6px 16px;
  border-radius: 10px; border: 1px solid var(--border);
  font-weight: 700; color: var(--accent); font-size: 0.9rem;
}
.progress-container {
  width: 240px; height: 12px;
  background: var(--bg-card); border-radius: 8px;
  border: 1px solid var(--border); overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 8px;
  background: linear-gradient(90deg, var(--accent), var(--purple));
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.progress-fill::after {
  content: ''; position: absolute; top:0; right:0; bottom:0;
  width: 30px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
  animation: shimmer 2s infinite;
}
@keyframes shimmer {
  0% { transform: translateX(-30px); }
  100% { transform: translateX(30px); }
}

.section-title {
  font-size: 1.4rem; font-weight: 700;
  margin: 32px 0 16px; display: flex; align-items: center; gap: 8px;
}
.section-title .icon { font-size: 1.2rem; }

.worlds-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.world-card {
  background: var(--bg-card); border-radius: 16px;
  border: 1px solid var(--border); padding: 20px;
  cursor: pointer; transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative; overflow: hidden;
}
.world-card::before {
  content: ''; position: absolute; top:0; left:0; right:0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--purple));
  opacity: 0; transition: opacity 0.3s;
}
.world-card:hover::before, .world-card:active::before { opacity: 1; }
.world-card:hover, .world-card:active {
  transform: translateY(-4px); border-color: var(--accent);
  box-shadow: var(--shadow-glow);
  background: var(--bg-card-hover);
}
.world-card.locked {
  opacity: 0.45; cursor: not-allowed; pointer-events: none;
}
.world-card.locked:hover, .world-card.locked:active {
  transform: none; box-shadow: none; border-color: var(--border);
}
.world-icon {
  width: 48px; height: 48px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; margin-bottom: 12px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
}
.world-card.locked .world-icon {
  background: var(--bg-card-hover);
}
.world-card h3 {
  font-size: 1.05rem; font-weight: 700; margin-bottom: 4px;
}
.world-card p {
  font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px;
}
.world-progress {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.8rem; color: var(--text-muted);
}
.world-progress-bar {
  flex: 1; height: 6px; background: var(--bg-dark);
  border-radius: 4px; overflow: hidden;
}
.world-progress-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--accent), var(--purple));
  transition: width 0.5s ease;
}

.games-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}
.game-card {
  background: var(--bg-card); border-radius: 16px;
  border: 1px solid var(--border); padding: 20px;
  cursor: pointer; transition: all 0.3s ease;
  text-align: center; position: relative; overflow: hidden;
  user-select: none;
}
.game-card::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at center, var(--accent-glow), transparent 70%);
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.game-card:hover::after, .game-card:active::after { opacity: 1; }
.game-card:hover, .game-card:active {
  transform: translateY(-3px) scale(1.01);
  border-color: var(--accent); box-shadow: var(--shadow-glow);
}
.game-icon {
  width: 52px; height: 52px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; margin: 0 auto 12px;
  background: linear-gradient(135deg, var(--purple), var(--pink));
}
.game-card h4 {
  font-size: 0.95rem; font-weight: 700; margin-bottom: 4px;
}
.game-card p {
  font-size: 0.78rem; color: var(--text-secondary);
}

.achievements-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}
.achievement-card {
  background: var(--bg-card); border-radius: 14px;
  border: 1px solid var(--border); padding: 16px;
  text-align: center; transition: all 0.3s;
}
.achievement-card.unlocked {
  border-color: var(--accent);
  background: linear-gradient(135deg, var(--bg-card), rgba(245,158,11,0.06));
  animation: unlockGlow 2s ease infinite;
}
@keyframes unlockGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.1); }
  50% { box-shadow: 0 0 20px 2px rgba(245,158,11,0.15); }
}
.achievement-card.locked { opacity: 0.35; }
.achievement-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; margin: 0 auto 8px;
  background: var(--bg-dark);
}
.achievement-card.unlocked .achievement-icon {
  background: linear-gradient(135deg, var(--accent), var(--purple));
}
.achievement-card h5 {
  font-size: 0.8rem; font-weight: 600; margin-bottom: 2px;
}
.achievement-card p {
  font-size: 0.7rem; color: var(--text-muted);
}

.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
  padding: 16px;
}
.modal-overlay.active { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg-card); border-radius: 20px;
  border: 1px solid var(--border);
  width: 100%; max-width: 680px; max-height: 85vh;
  overflow-y: auto; position: relative;
  transform: scale(0.92) translateY(16px);
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: var(--shadow);
}
.modal-overlay.active .modal {
  transform: scale(1) translateY(0);
}
.modal-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--bg-card); z-index: 10;
}
.modal-header h2 {
  font-size: 1.2rem; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.modal-close {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--bg-dark); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; transition: all 0.2s;
}
.modal-close:hover { background: var(--error); color: #fff; }
.modal-body { padding: 20px 24px; }

.tracing-container {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.tracing-canvas-wrapper {
  position: relative; width: 100%; max-width: 340px; aspect-ratio: 1;
  background: var(--bg-dark); border-radius: 16px;
  border: 2px solid var(--border); overflow: hidden;
  touch-action: none;
}
#tracing-canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  cursor: crosshair; touch-action: none;
}
.tracing-guide {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Noto Naskh Arabic', serif;
  font-size: 10rem; color: rgba(245,158,11,0.12);
  pointer-events: none; user-select: none;
  direction: rtl;
}
.tracing-controls {
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
}
.btn {
  padding: 8px 20px; border-radius: 10px; border: none;
  font-weight: 600; cursor: pointer; transition: all 0.3s;
  font-size: 0.9rem; display: inline-flex; align-items: center; gap: 6px;
  user-select: none;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--purple));
  color: #fff; box-shadow: 0 4px 16px var(--accent-glow);
}
.btn-primary:hover, .btn-primary:active { transform: translateY(-2px); box-shadow: 0 6px 24px var(--accent-glow); }
.btn-secondary {
  background: var(--bg-dark); color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover, .btn-secondary:active { background: var(--bg-card-hover); border-color: var(--accent); }
.letter-selector {
  display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  margin-bottom: 12px;
}
.letter-btn {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--bg-dark); border: 1px solid var(--border);
  color: var(--text-primary); font-family: 'Noto Naskh Arabic', serif;
  font-size: 1.2rem; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  user-select: none;
}
.letter-btn:hover, .letter-btn:active, .letter-btn.active {
  background: var(--accent); color: #000; border-color: var(--accent);
  transform: scale(1.08);
}

.memory-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; max-width: 380px; margin: 0 auto;
}
.memory-card {
  aspect-ratio: 1; border-radius: 12px;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  font-size: 1.4rem; font-weight: 700;
  transform-style: preserve-3d; position: relative;
  border: 2px solid transparent;
  user-select: none;
}
.memory-card.flipped {
  background: var(--bg-dark); border-color: var(--accent);
  transform: rotateY(180deg);
}
.memory-card.matched {
  background: var(--success); border-color: var(--success);
  animation: matchPulse 0.5s ease;
}
@keyframes matchPulse {
  0%, 100% { transform: scale(1) rotateY(180deg); }
  50% { transform: scale(1.12) rotateY(180deg); }
}
.memory-card-inner {
  backface-visibility: hidden;
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px;
}
.memory-card-front {
  background: linear-gradient(135deg, var(--purple), var(--pink));
  font-size: 1.2rem;
}
.memory-card-back {
  background: var(--bg-dark); border: 2px solid var(--accent);
  transform: rotateY(180deg); flex-direction: column; gap: 2px;
  padding: 4px;
}
.memory-card-back .ar { font-family:'Noto Naskh Arabic',serif; font-size:1.2rem; }
.memory-card-back .bs { font-size:0.7rem; color:var(--text-secondary); }

.quiz-container { text-align: center; }
.quiz-question {
  font-size: 1.15rem; font-weight: 700; margin-bottom: 20px;
  padding: 16px; background: var(--bg-dark); border-radius: 14px;
  border: 1px solid var(--border);
}
.quiz-question .arabic {
  font-family: 'Noto Naskh Arabic', serif; font-size: 1.8rem;
  color: var(--accent); display: block; margin-bottom: 6px;
}
.quiz-options {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; max-width: 460px; margin: 0 auto;
}
.quiz-option {
  padding: 14px; border-radius: 12px;
  background: var(--bg-dark); border: 2px solid var(--border);
  color: var(--text-primary); font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: all 0.3s;
  user-select: none;
}
.quiz-option:hover, .quiz-option:active {
  border-color: var(--accent); background: var(--bg-card-hover);
  transform: translateY(-2px);
}
.quiz-option.correct {
  border-color: var(--success); background: rgba(34,197,94,0.15);
  animation: correctBounce 0.5s ease;
}
.quiz-option.wrong {
  border-color: var(--error); background: rgba(239,68,68,0.15);
  animation: wrongShake 0.5s ease;
}
@keyframes correctBounce {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}
@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.quiz-score {
  display: flex; justify-content: center; gap: 16px;
  margin-bottom: 16px;
}
.quiz-score-item {
  background: var(--bg-dark); padding: 6px 14px;
  border-radius: 8px; font-weight: 700; font-size: 0.9rem;
}

.puzzle-word {
  display: flex; gap: 6px; justify-content: center;
  margin: 16px 0; flex-wrap: wrap;
}
.puzzle-letter {
  width: 44px; height: 50px; border-radius: 10px;
  background: var(--bg-dark); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Naskh Arabic', serif;
  font-size: 1.4rem; font-weight: 700;
  transition: all 0.3s;
  user-select: none;
}
.puzzle-letter.filled {
  border-color: var(--accent);
  background: rgba(245,158,11,0.08);
}
.puzzle-letters-pool {
  display: flex; gap: 8px; justify-content: center;
  flex-wrap: wrap; margin-top: 12px;
}
.puzzle-pool-letter {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  color: #fff; font-family: 'Noto Naskh Arabic', serif;
  font-size: 1.2rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; border: none;
  user-select: none;
}
.puzzle-pool-letter:hover, .puzzle-pool-letter:active { transform: scale(1.12); }
.puzzle-pool-letter.used { opacity: 0.25; pointer-events: none; }
.puzzle-hint {
  color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 10px;
}

.listen-container { text-align: center; }
.listen-btn {
  width: 90px; height: 90px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border: none; color: #fff; font-size: 2.2rem;
  cursor: pointer; margin: 16px auto;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 28px var(--accent-glow);
  transition: all 0.3s; animation: pulse 2.5s infinite;
  user-select: none;
}
.listen-btn:hover, .listen-btn:active { transform: scale(1.08); }
.listen-btn.playing { animation: spin 0.8s linear infinite; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 8px 28px var(--accent-glow); }
  50% { box-shadow: 0 8px 45px var(--accent-glow); }
}
@keyframes spin { to { transform: rotate(360deg); } }
.listen-options {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; max-width: 440px; margin: 16px auto 0;
}
.listen-option {
  padding: 12px; border-radius: 12px;
  background: var(--bg-dark); border: 2px solid var(--border);
  color: var(--text-primary); font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: all 0.3s;
  user-select: none;
}
.listen-option:hover, .listen-option:active { border-color: var(--accent); }

.pronounce-container { text-align: center; }
.pronounce-word {
  font-family: 'Noto Naskh Arabic', serif;
  font-size: 2.6rem; color: var(--accent); margin: 16px 0;
}
.pronounce-trans {
  font-size: 1rem; color: var(--text-secondary); margin-bottom: 16px;
}
.mic-btn {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, var(--teal), var(--info));
  border: none; color: #fff; font-size: 2rem;
  cursor: pointer; margin: 8px auto;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 28px rgba(20,184,166,0.25);
  transition: all 0.3s;
  user-select: none;
}
.mic-btn:hover, .mic-btn:active { transform: scale(1.08); }
.mic-btn.listening {
  animation: micPulse 1s infinite;
  background: linear-gradient(135deg, var(--error), var(--pink));
}
@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.35); }
  50% { box-shadow: 0 0 0 18px rgba(239,68,68,0); }
}
.pronounce-result {
  margin-top: 16px; padding: 14px; border-radius: 12px;
  font-weight: 600; min-height: 50px; font-size: 0.95rem;
}
.pronounce-result.match {
  background: rgba(34,197,94,0.12); border: 1px solid var(--success); color: var(--success);
}
.pronounce-result.nomatch {
  background: rgba(239,68,68,0.12); border: 1px solid var(--error); color: var(--error);
}

#confetti-canvas {
  position: fixed; inset: 0; z-index: 300;
  pointer-events: none;
}

.toast-container {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 250; display: flex; flex-direction: column; gap: 8px;
  max-width: 90vw;

  from { opacity: 0; transform: translateY(20px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }

var AudioCtx = window.AudioContext || window.webkitAudioContext;
var audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ===================== MUSIC SYSTEM =====================
function playTone(freq, duration, type, vol, when) {
  if (!soundOn) return null;
  vol = vol || 0.12; type = type || 'sine'; when = when || 0;
  try {
    var ctx = getAudioCtx();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + when);
    gain.gain.setValueAtTime(vol, ctx.currentTime + when);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + when + duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime + when);
    osc.stop(ctx.currentTime + when + duration);
    return osc;
  } catch(e) { return null; }
}

function playChord(freqs, duration, vol) {
  if (!soundOn) return;
  vol = vol || 0.08;
  freqs.forEach(function(f, i) {
    playTone(f, duration, 'sine', vol, i * 0.05);
  });
}

function playMelody() {
  if (!musicOn || !soundOn) return;
  var notes = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63, 261.63, 196.00];
  var now = getAudioCtx().currentTime;
  notes.forEach(function(freq, i) {
    playTone(freq, 0.4, 'sine', 0.06, i * 0.5);
  });
  if (musicOn) {
    setTimeout(playMelody, 4500);
  }
}

// ===================== PARTICLES =====================
(function initParticles() {
  var canvas = document.getElementById('particles-canvas');
  var ctx = canvas.getContext('2d');
  var particles = [];
  function resize() {
    var dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.scale(dpr, dpr);
  }
  resize();
  window.addEventListener('resize', resize);
  for (var i = 0; i < 50; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 2 + 0.5,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
      alpha: Math.random() * 0.4 + 0.1,
      color: ['#f59e0b','#a855f7','#ec4899','#14b8a6'][Math.floor(Math.random()*4)]
    });
  }
  function draw() {
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    particles.forEach(function(p) {
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0) p.x = window.innerWidth;
      if (p.x > window.innerWidth) p.x = 0;
      if (p.y < 0) p.y = window.innerHeight;
      if (p.y > window.innerHeight) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();
})();

// ===================== CONFETTI =====================
function fireConfetti() {
  var canvas = document.getElementById('confetti-canvas');
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.scale(dpr, dpr);
  var pieces = [];
  var colors = ['#f59e0b','#a855f7','#ec4899','#22c55e','#3b82f6','#14b8a6','#ffd700','#ff6b6b'];
  for (var i = 0; i < 150; i++) {
    pieces.push({
      x: window.innerWidth / 2 + (Math.random() - 0.5) * 100,
      y: window.innerHeight / 2,
      vx: (Math.random() - 0.5) * 14,
      vy: (Math.random() - 1) * 12 - 3,
      r: Math.random() * 5 + 2,
      color: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 8,
      gravity: 0.22,
      life: 1,
      shape: Math.random() > 0.5 ? 'rect' : 'circle'
    });
  }
  function draw() {
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    var alive = false;
    pieces.forEach(function(p) {
      if (p.life <= 0) return;
      alive = true;
      p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
      p.rot += p.rotSpeed; p.life -= 0.007;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r);
      } else {
        ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    });
    ctx.globalAlpha = 1;
    if (alive) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  }
  draw();
}

// ===================== USER STATE =====================
function loadUser() {
  try {
    var saved = localStorage.getItem('arabi_mali_user_v2');
    if (saved) {
      var parsed = JSON.parse(saved);
      for (var k in parsed) {
        if (k === 'achievements' || k === 'worldsProgress') {
          for (var sub in parsed[k]) user[k][sub] = parsed[k][sub];
        } else {
          user[k] = parsed[k];
        }
      }
    }
    // Check streak
    var today = new Date().toDateString();
    if (user.lastVisit) {
      var last = new Date(user.lastVisit);
      var diff = (new Date(today) - last) / (1000 * 60 * 60 * 24);
      if (diff === 1) user.streak++;
      else if (diff > 1) user.streak = 1;
    } else {
      user.streak = 1;
    }
    if (user.lastVisit !== today) {
      user.dailyClaimed = false;
      user.lastVisit = today;
    }
  } catch(e) {}
  updateStats();
}

function saveUser() {
  try { localStorage.setItem('arabi_mali_user_v2', JSON.stringify(user)); } catch(e) {}
}

function addXP(amount) {
  user.xp += amount;
  user.lessonsCompleted++;
  var needed = user.level * 100;
  if (user.xp >= needed) {
    user.level++;
    user.xp -= needed;
    showToast(T('newLevel') + ' ' + T('level') + ' ' + user.level + '!', 'success');
    playUnlock(); fireConfetti();
  }
  checkAchievements();
  updateStats(); saveUser();
}

function addGems(amount) {
  user.gems += amount;
  updateStats(); saveUser(); checkAchievements();
}

function updateStats() {
  document.getElementById('stat-xp').textContent = user.xp;
  document.getElementById('stat-gems').textContent = user.gems;
  document.getElementById('stat-streak').textContent = user.streak;
  document.getElementById('level-info').textContent = T('level') + ' ' + user.level;
  var needed = user.level * 100;
  var pct = Math.min((user.xp / needed) * 100, 100);
  document.getElementById('xp-bar').style.width = pct + '%';
  document.getElementById('xp-text').textContent = user.xp + ' / ' + needed + ' ' + T('xp');
}

function checkAchievements() {
  if (user.level >= 1 && !user.achievements.beginner) {
    user.achievements.beginner = true;
    showToast(T('earned') + ': ' + T('beginner') + '!', 'unlock');
    playUnlock(); fireConfetti();
  }
  if (user.xp >= 500 && !user.achievements.points500) {
    user.achievements.points500 = true;
    showToast(T('earned') + ': ' + T('points500') + '!', 'unlock');
    playUnlock(); fireConfetti();
  }
  if (user.gems >= 100 && !user.achievements.gems100) {
    user.achievements.gems100 = true;
    showToast(T('earned') + ': ' + T('gems100') + '!', 'unlock');
    playUnlock(); fireConfetti();
  }
  if (user.streak >= 3 && !user.achievements.streak3) {
    user.achievements.streak3 = true;
    showToast(T('earned') + ': ' + T('streak3') + '!', 'unlock');
    playUnlock(); fireConfetti();
  }
  if (user.level >= 10 && !user.achievements.champion) {
    user.achievements.champion = true;
    showToast(T('earned') + ': ' + T('champion') + '!', 'unlock');
    playUnlock(); fireConfetti();
  }
  renderAchievements(); saveUser();
}

  var l = DATA.letters[0];
  var html = '<div class="tracing-container">' +
    '<p style="color:var(--text-secondary);margin-bottom:8px;font-size:0.9rem;">' + T('traceDesc') + '</p>' +
    '<div class="letter-selector" id="trace-letters">' +
      DATA.letters.slice(0, 10).map(function(ll, i) {
        return '<button class="letter-btn ' + (i===0?'active':'') + '" onclick="selectTraceLetter(' + i + ')" id="trace-btn-' + i + '">' + ll.ar + '</button>';
      }).join('') +
    '</div>' +
    '<div class="tracing-canvas-wrapper">' +
      '<div class="tracing-guide" id="trace-guide">' + l.ar + '</div>' +
      '<canvas id="tracing-canvas"></canvas>' +
    '</div>' +
    '<div class="tracing-controls">' +
      '<button class="btn btn-secondary" onclick="clearTrace()">🗑️ ' + T('clear') + '</button>' +
      '<button class="btn btn-primary" onclick="speakArabic('' + l.ar + '')">🔊 ' + T('listen') + '</button>' +
      '<button class="btn btn-primary" onclick="nextTraceLetter()">➡️ ' + T('next') + '</button>' +
    '</div>' +
  '</div>';
  openModal(T('trace'), html);
  setTimeout(function() {
    var canvas = document.getElementById('tracing-canvas');
    traceCtx = setupHiDPICanvas(canvas);
    traceCtx.strokeStyle = '#f59e0b';
    traceCtx.lineWidth = 4;
    traceCtx.lineCap = 'round';
    traceCtx.lineJoin = 'round';
    traceCanvas = canvas;

    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      var clientX = e.clientX || (e.touches && e.touches[0].clientX);
      var clientY = e.clientY || (e.touches && e.touches[0].clientY);
      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    canvas.addEventListener('mousedown', function(e) {
      isDrawing = true;
      var pos = getPos(e);
      traceCtx.beginPath();
      traceCtx.moveTo(pos.x, pos.y);
    });
    canvas.addEventListener('mousemove', function(e) {
      if (!isDrawing) return;
      var pos = getPos(e);
      traceCtx.lineTo(pos.x, pos.y);
      traceCtx.stroke();
    });
    canvas.addEventListener('mouseup', function() { isDrawing = false; });
    canvas.addEventListener('mouseleave', function() { isDrawing = false; });

    canvas.addEventListener('touchstart', function(e) { e.preventDefault(); isDrawing = true; var pos = getPos(e); traceCtx.beginPath(); traceCtx.moveTo(pos.x, pos.y); }, {passive:false});
    canvas.addEventListener('touchmove', function(e) { e.preventDefault(); if (!isDrawing) return; var pos = getPos(e); traceCtx.lineTo(pos.x, pos.y); traceCtx.stroke(); }, {passive:false});
    canvas.addEventListener('touchend', function(e) { e.preventDefault(); isDrawing = false; }, {passive:false});
  }, 100);
}

function clearTrace() {
  if (!traceCtx || !traceCanvas) return;
  var rect = traceCanvas.getBoundingClientRect();
  traceCtx.clearRect(0, 0, rect.width, rect.height);
  playClick();
}

function selectTraceLetter(idx) {
  currentTraceLetter = idx;
  var btns = document.querySelectorAll('#trace-letters .letter-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  document.getElementById('trace-btn-'+idx).classList.add('active');
  document.getElementById('trace-guide').textContent = DATA.letters[idx].ar;
  clearTrace();
  playClick();
}

function nextTraceLetter() {
  if (currentTraceLetter < 9) {
    selectTraceLetter(currentTraceLetter + 1);
    addXP(5);
  } else {
    showToast(T('congrats') + '!', 'success');
    fireConfetti(); playSuccess(); addXP(20);
  }
}

// ===================== MEMORY GAME =====================
var memoryCards = [], memoryFlipped = [], memoryMatched = 0, memoryMoves = 0;

function initMemoryGame() {
  var pairs = DATA.words.slice(0, 6);
  var cards = [];
  pairs.forEach(function(w) {
    cards.push({ id: w.ar, text: w.ar, type: 'ar' });
    cards.push({ id: w.ar, text: w.bs, type: 'bs' });
  });
  memoryCards = cards.sort(function() { return Math.random() - 0.5; });
  memoryFlipped = []; memoryMatched = 0; memoryMoves = 0;
  var html = '<div style="text-align:center;">' +
    '<div class="quiz-score" style="margin-bottom:12px;">' +
      '<div class="quiz-score-item">' + T('score') + ': <span id="mem-score">0</span></div>' +
      '<div class="quiz-score-item">Potezi: <span id="mem-moves">0</span></div>' +
    '</div>' +
    '<div class="memory-grid" id="memory-grid">' +
      memoryCards.map(function(c, i) {
        return '<div class="memory-card" id="mem-card-' + i + '" onclick="flipMemoryCard(' + i + ')">' +
          '<div class="memory-card-inner memory-card-front">?</div>' +
          '<div class="memory-card-inner memory-card-back">' +
            '<span class="' + (c.type==='ar'?'ar':'bs') + '">' + c.text + '</span>' +
          '</div>' +
        '</div>';
      }).join('') +
    '</div>' +
  '</div>';
  openModal(T('memory'), html);
}

function flipMemoryCard(idx) {
  var card = document.getElementById('mem-card-'+idx);
  if (card.classList.contains('flipped') || card.classList.contains('matched') || memoryFlipped.length >= 2) return;
  card.classList.add('flipped');
  memoryFlipped.push({ idx: idx, id: memoryCards[idx].id });
  playClick();
  if (memoryFlipped.length === 2) {
    memoryMoves++;
    document.getElementById('mem-moves').textContent = memoryMoves;
    var a = memoryFlipped[0], b = memoryFlipped[1];
    if (a.id === b.id) {
      setTimeout(function() {
        document.getElementById('mem-card-'+a.idx).classList.add('matched');
        document.getElementById('mem-card-'+b.idx).classList.add('matched');
        memoryMatched++; memoryFlipped = [];
        document.getElementById('mem-score').textContent = memoryMatched;
        playSuccess();
        if (memoryMatched === 6) {
          setTimeout(function() {
            showToast(T('congrats') + '! +30 XP', 'success');
            fireConfetti(); addXP(30); addGems(5);
          }, 500);
        }
      }, 600);
    } else {
      setTimeout(function() {
        document.getElementById('mem-card-'+a.idx).classList.remove('flipped');
        document.getElementById('mem-card-'+b.idx).classList.remove('flipped');
        memoryFlipped = []; playError();
      }, 1000);
    }
  }
}

// ===================== QUIZ GAME =====================
var quizQuestions = [], quizCurrent = 0, quizScore = 0;

function initQuizGame() {
  quizQuestions = [];
  for (var i = 0; i < 5; i++) {
    var w = DATA.words[Math.floor(Math.random() * DATA.words.length)];
    var wrong = DATA.words.filter(function(x) { return x.bs !== w.bs; }).sort(function() { return Math.random() - 0.5; }).slice(0, 3);
    var opts = [w].concat(wrong).sort(function() { return Math.random() - 0.5; });
    quizQuestions.push({ word: w, options: opts });
  }
  quizCurrent = 0; quizScore = 0;
  renderQuizQuestion();
}

function renderQuizQuestion() {
  if (quizCurrent >= quizQuestions.length) {
    var html = '<div style="text-align:center;padding:30px;">' +
      '<div style="font-size:4rem;margin-bottom:16px;">🎉</div>' +
      '<h2 style="margin-bottom:10px;">' + T('congrats') + '!</h2>' +
      '<p style="font-size:1.2rem;color:var(--accent);margin-bottom:20px;">' + T('score') + ': ' + quizScore + ' / ' + quizQuestions.length + '</p>' +
      '<button class="btn btn-primary" onclick="initQuizGame()">🔄 Igraj ponovo</button>' +
    '</div>';
    openModal(T('quiz'), html);
    if (quizScore >= 4) { fireConfetti(); addXP(25); addGems(3); }
    return;
  }
  var q = quizQuestions[quizCurrent];
  var html = '<div class="quiz-container">' +
    '<div class="quiz-score">' +
      '<div class="quiz-score-item">' + T('score') + ': ' + quizScore + '</div>' +
      '<div class="quiz-score-item">' + (quizCurrent + 1) + ' / ' + quizQuestions.length + '</div>' +
    '</div>' +
    '<div class="quiz-question">' +
      '<span class="arabic">' + q.word.ar + '</span>' +
      '<span>' + (lang==='bs' ? 'Šta znači ova riječ?' : 'ماذا تعني هذه الكلمة؟') + '</span>' +
    '</div>' +
    '<div class="quiz-options">' +
      q.options.map(function(opt, i) {
        return '<button class="quiz-option" id="quiz-opt-' + i + '" onclick="answerQuiz(' + i + ')">' + opt.bs + '</button>';
      }).join('') +
    '</div>' +
  '</div>';
  if (quizCurrent === 0) openModal(T('quiz'), html);
  else document.getElementById('modal-body').innerHTML = html;
}

function answerQuiz(idx) {
  var q = quizQuestions[quizCurrent];
  var correct = q.options[idx].bs === q.word.bs;
  document.getElementById('quiz-opt-'+idx).classList.add(correct ? 'correct' : 'wrong');
  if (correct) { quizScore++; playSuccess(); speakArabic(q.word.ar); }
  else { playError(); }
  var btns = document.querySelectorAll('.quiz-option');
  for (var i = 0; i < btns.length; i++) {
    btns[i].disabled = true;
    if (q.options[i].bs === q.word.bs) btns[i].classList.add('correct');
  }
  setTimeout(function() { quizCurrent++; renderQuizQuestion(); }, 1200);
}

// ===================== PUZZLE GAME =====================
var puzzleWord = null, puzzleFilled = [], puzzlePool = [];

function initPuzzleGame() {
  puzzleWord = DATA.words[Math.floor(Math.random() * DATA.words.length)];
  var arLetters = puzzleWord.ar.split('');
  puzzleFilled = new Array(arLetters.length).fill(null);
  var extra = ['ا','ب','ت','ث','ج','ح','خ','د','ذ','ر','ز','س','ش','ص','ض','ط','ظ','ع','غ','ف','ق','ك','ل','م','ن','ه','و','ي'];
  var pool = arLetters.slice();
  while (pool.length < arLetters.length + 4) {
    var e = extra[Math.floor(Math.random() * extra.length)];
    if (pool.indexOf(e) === -1) pool.push(e);
  }
  puzzlePool = pool.sort(function() { return Math.random() - 0.5; });
  renderPuzzle();
}

function renderPuzzle() {
  var arLetters = puzzleWord.ar.split('');
  var html = '<div style="text-align:center;">' +
    '<p class="puzzle-hint">' + (lang==='bs' ? 'Sastavite riječ:' : 'أكمل الكلمة:') + ' <strong style="color:var(--accent);">' + puzzleWord.bs + '</strong></p>' +
    '<div class="puzzle-word" id="puzzle-slots">' +
      arLetters.map(function(l, i) {
        return '<div class="puzzle-letter ' + (puzzleFilled[i] ? 'filled' : '') + '" id="puzzle-slot-' + i + '" onclick="removePuzzleLetter(' + i + ')">' + (puzzleFilled[i] || '') + '</div>';
      }).join('') +
    '</div>' +
    '<div class="puzzle-letters-pool" id="puzzle-pool">' +
      puzzlePool.map(function(l, i) {
        return '<button class="puzzle-pool-letter ' + (puzzlePool[i] === null ? 'used' : '') + '" id="puzzle-pool-' + i + '" onclick="placePuzzleLetter(' + i + ')">' + (l || '') + '</button>';
      }).join('') +
    '</div>' +
    '<div style="margin-top:16px;display:flex;gap:8px;justify-content:center;">' +
      '<button class="btn btn-secondary" onclick="initPuzzleGame()">🔄 ' + T('tryAgain') + '</button>' +
      '<button class="btn btn-primary" onclick="checkPuzzle()">✅ ' + T('check') + '</button>' +
    '</div>' +
  '</div>';
  openModal(T('puzzle'), html);
}

function placePuzzleLetter(poolIdx) {
  if (puzzlePool[poolIdx] === null) return;
  var emptyIdx = puzzleFilled.indexOf(null);
  if (emptyIdx === -1) return;
  puzzleFilled[emptyIdx] = puzzlePool[poolIdx];
  puzzlePool[poolIdx] = null;
  playClick();
  renderPuzzle();
}

function removePuzzleLetter(slotIdx) {
  if (!puzzleFilled[slotIdx]) return;
  var emptyPoolIdx = puzzlePool.indexOf(null);
  if (emptyPoolIdx === -1) return;
  puzzlePool[emptyPoolIdx] = puzzleFilled[slotIdx];
  puzzleFilled[slotIdx] = null;
  playClick();
  renderPuzzle();
}

function checkPuzzle() {
  var answer = puzzleFilled.join('');
  if (answer === puzzleWord.ar) {
    showToast(T('correct') + ' +15 XP', 'success');
    playSuccess(); fireConfetti(); addXP(15); addGems(2);
    setTimeout(initPuzzleGame, 1500);
  } else {
    showToast(T('wrong') + ' ' + T('tryAgain'), 'error');
    playError();
  }
}

// ===================== LISTEN GAME =====================
var listenWord = null, listenOptions = [];

function initListenGame() {
  listenWord = DATA.words[Math.floor(Math.random() * DATA.words.length)];
  var wrong = DATA.words.filter(function(w) { return w.ar !== listenWord.ar; }).sort(function() { return Math.random() - 0.5; }).slice(0, 3);
  listenOptions = [listenWord].concat(wrong).sort(function() { return Math.random() - 0.5; });
  var html = '<div class="listen-container">' +
    '<p style="color:var(--text-secondary);margin-bottom:8px;">' + (lang==='bs' ? 'Kliknite i slušajte, zatim odaberite značenje:' : 'اضغط واستمع، ثم اختر المعنى:') + '</p>' +
    '<button class="listen-btn" id="listen-btn" onclick="playListenWord()">🔊</button>' +
    '<div class="listen-options">' +
      listenOptions.map(function(opt, i) {
        return '<button class="listen-option" id="listen-opt-' + i + '" onclick="answerListen(' + i + ')">' + opt.bs + '</button>';
      }).join('') +
    '</div>' +
  '</div>';
  openModal(T('listenGuess'), html);
  setTimeout(playListenWord, 500);
}

function playListenWord() {
  var btn = document.getElementById('listen-btn');
  if (btn) btn.classList.add('playing');
  speakArabic(listenWord.ar);
  setTimeout(function() { if (btn) btn.classList.remove('playing'); }, 2000);
}

function answerListen(idx) {
  var correct = listenOptions[idx].ar === listenWord.ar;
  var opt = document.getElementById('listen-opt-'+idx);
  if (!opt) return;
  opt.style.borderColor = correct ? 'var(--success)' : 'var(--error)';
  opt.style.background = correct ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)';
  if (correct) {
    playSuccess(); showToast(T('correct') + ' +10 XP', 'success');
    addXP(10); addGems(1); fireConfetti();
    setTimeout(initListenGame, 1500);
  } else {
    playError(); showToast(T('wrong'), 'error');
  }
}

// ===================== PRONOUNCE GAME (Cross-browser) =====================
var pronounceWord = null;
var recognition = null;

function initPronounceGame() {
  pronounceWord = DATA.words[Math.floor(Math.random() * DATA.words.length)];
  var html = '<div class="pronounce-container">' +
    '<p style="color:var(--text-secondary);margin-bottom:8px;">' + (lang==='bs' ? 'Kliknite mikrofon i izgovorite:' : 'اضغط على الميكروفون وانطق:') + '</p>' +
    '<div class="pronounce-word">' + pronounceWord.ar + '</div>' +
    '<div class="pronounce-trans">' + pronounceWord.bs + '</div>' +
    '<button class="mic-btn" id="mic-btn" onclick="startListening()">🎤</button>' +
    '<div class="pronounce-result" id="pronounce-result" style="color:var(--text-secondary);">' + (lang==='bs' ? 'Pritisnite mikrofon i govorite...' : 'اضغط على الميكروفون وتحدث...') + '</div>' +
    '<div style="margin-top:12px;display:flex;gap:8px;justify-content:center;">' +
      '<button class="btn btn-secondary" onclick="initPronounceGame()">🔄 ' + T('next') + '</button>' +
      '<button class="btn btn-primary" onclick="speakArabic('' + pronounceWord.ar + '')">🔊 ' + T('listen') + '</button>' +
    '</div>' +
  '</div>';
  openModal(T('pronounce'), html);
}

function startListening() {
  var btn = document.getElementById('mic-btn');
  var result = document.getElementById('pronounce-result');
  if (!btn || !result) return;
  btn.classList.add('listening');
  result.textContent = lang === 'bs' ? 'Slušam...' : 'أستمع...';
  result.className = 'pronounce-result';

  var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) {
    result.textContent = lang === 'bs' ? 'Vaš preglednik ne podržava prepoznavanje govora. Koristite Chrome ili Edge.' : 'متصفحك لا يدعم التعرف على الكلام. استخدم Chrome أو Edge.';
    btn.classList.remove('listening');
    return;
  }

  recognition = new SpeechRec();
  recognition.lang = 'ar-SA';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = function(e) {
    var transcript = e.results[0][0].transcript.trim();
    var target = pronounceWord.ar;
    var sim = similarity(transcript, target);
    var match = transcript.indexOf(target) !== -1 || target.indexOf(transcript) !== -1 || sim > 0.4;
    if (match) {
      result.className = 'pronounce-result match';
      result.textContent = '✅ ' + (lang==='bs' ? 'Odlično! Tačno izgovoreno.' : 'ممتاز! النطق صحيح.');
      playSuccess(); fireConfetti(); addXP(20); addGems(3);
    } else {
      result.className = 'pronounce-result nomatch';
      result.textContent = '❌ ' + (lang==='bs' ? 'Čulo se: "' + transcript + '" (sličnost: ' + Math.round(sim*100) + '%). Pokušajte ponovo!' : 'سمعت: "' + transcript + '" (التشابه: ' + Math.round(sim*100) + '%). حاول مرة أخرى!');
      playError();
    }
    btn.classList.remove('listening');
  };

  recognition.onerror = function(e) {
    result.textContent = lang === 'bs' ? 'Greška: ' + e.error + '. Pokušajte ponovo.' : 'خطأ: ' + e.error + '. حاول مرة أخرى.';
    btn.classList.remove('listening');
  };

  recognition.onend = function() { btn.classList.remove('listening'); };
  try { recognition.start(); } catch(e) {
    result.textContent = lang === 'bs' ? 'Greška pri pokretanju mikrofona.' : 'خطأ في تشغيل الميكروفون.';
    btn.classList.remove('listening');
  }
}

function similarity(s1, s2) {
  var longer = s1.length > s2.length ? s1 : s2;
  var shorter = s1.length > s2.length ? s2 : s1;
  if (longer.length === 0) return 1.0;
  var costs = [];
  for (var i = 0; i <= shorter.length; i++) {
    var lastValue = i;
    for (var j = 0; j <= longer.length; j++) {
      if (i === 0) costs[j] = j;
      else if (j > 0) {
        var newValue = costs[j - 1];
        if (shorter[i - 1] !== longer[j - 1]) {
          newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
        }
        costs[j - 1] = lastValue;
        lastValue = newValue;
      }
    }
    if (i > 0) costs[longer.length] = lastValue;
  }
  return (longer.length - costs[longer.length]) / longer.length;
}

// ===================== INIT =====================
function init() {
  loadUser();
  renderWorlds();
  renderGames();
  renderAchievements();
  updateStats();
  setLang('bs');
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });
  // Resume audio context on first interaction
  document.addEventListener('click', function() {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }, { once: true });
}

init();
</script>
